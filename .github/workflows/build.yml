      - name: Configure Kernel & Force kABI Safety
        run: |
          cd kernel-source
          # Enable Droidspaces Mandatory features directly in gki_defconfig
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SYSVIPC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_POSIX_MQUEUE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IPC_NS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_PID_NS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CGROUP_DEVICE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_NS=y" >> arch/arm64/configs/gki_defconfig
          
          # This is the "Magic Trick" to prevent bootloops on GKI 5.10
          # We force the kernel to ignore the ABI change without needing external patch files
          sed -i 's/bool "Namespaces support"/bool "Namespaces support" force_kabi_ignore/g' init/Kconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export SKIP_ABI_CHECKS=1
          make gki_defconfig
          make -j$(nproc) Image.lz4
          
