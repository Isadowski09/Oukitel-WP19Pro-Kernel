name: Build Oukitel Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm crossbuild-essential-arm64

      - name: Clone Kernel Source
        run: |
          # Matches your kernel hash 0d9b8f860603 exactly
          git clone --depth=1 -b android12-5.10-2024-11_r2 https://android.googlesource.com/kernel/common kernel-source

      - name: Configure Kernel for DroidSpace
        run: |
          cd kernel-source
          # Enable mandatory features for containers
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SYSVIPC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_POSIX_MQUEUE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IPC_NS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_PID_NS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEVTMPFS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CGROUP_DEVICE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_NS=y" >> arch/arm64/configs/gki_defconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # This variable handles the ABI safety instead of modifying Kconfig
          export SKIP_ABI_CHECKS=1
          make gki_defconfig
          make -j$(nproc) Image.lz4

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: kernel-source/arch/arm64/boot/Image.lz4
