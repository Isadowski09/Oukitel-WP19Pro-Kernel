- name: Force GZIP Compression
  run: |
    sed -i 's/CONFIG_KERNEL_LZ4=y/CONFIG_KERNEL_GZIP=y/g' arch/arm64/configs/gki_defconfig
    echo "CONFIG_KERNEL_GZIP=y" >> arch/arm64/configs/gki_defconfig
    echo "# CONFIG_KERNEL_LZ4 is not set" >> arch/arm64/configs/gki_defconfig

name: Build Oukitel Kernel + KSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm crossbuild-essential-arm64

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b android12-5.10-2024-11_r2 https://android.googlesource.com/kernel/common kernel-source

      - name: Integrate KernelSU Next
        run: |
          cd kernel-source
          # Clone into a fixed, lowercase folder name
          git clone https://github.com/rifsxd/KernelSU-Next ksunext
          
          # Use 'find' to locate the file so path errors are impossible
          FILEPATH=$(find ksunext -name "patch_memory.c")
          sed -i 's/ksu_flush_icache(start, end);/(void)start; (void)end;/g' "$FILEPATH"
          
          # Link to drivers
          ln -sf $(pwd)/ksunext/kernel drivers/kernelsu
          echo "obj-y += kernelsu/" >> drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Configure Kernel for DroidSpace & KSU
        run: |
          cd kernel-source
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CGROUP_DEVICE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/gki_defconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export SKIP_ABI_CHECKS=1
          make gki_defconfig
          make -j$(nproc) Image.lz4

      - name: Upload Rooted Kernel
        uses: actions/upload-artifact@v4
        with:
          name: rooted-kernel-build
          path: kernel-source/arch/arm64/boot/Image.lz4
